<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#07070f"/>
      <stop offset="50%"  stop-color="#0c0820"/>
      <stop offset="100%" stop-color="#070d1a"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="40%"  stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#7c3aed"/>
      <stop offset="70%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="glowL" cx="20%" cy="40%" r="45%">
      <stop offset="0%"   stop-color="#5b21b6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowR" cx="80%" cy="60%" r="45%">
      <stop offset="0%"   stop-color="#0e7490" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>

    <!-- Heavy neon glow for terminal text -->
    <filter id="neonGlow" x="-40%" y="-150%" width="180%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"  result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"  result="b2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b3"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="b4"/>
      <feMerge>
        <feMergeNode in="b4"/>
        <feMergeNode in="b3"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Softer glow for name -->
    <filter id="nameGlow" x="-15%" y="-60%" width="130%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"  result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for subtitle / success -->
    <filter id="softGlow" x="-15%" y="-80%" width="130%" height="360%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="clip">
      <rect width="900" height="320" rx="14" ry="14"/>
    </clipPath>

  </defs>

  <g clip-path="url(#clip)">

    <!-- Background -->
    <rect width="900" height="320" fill="url(#bg)"/>
    <rect width="900" height="320" fill="url(#glowL)"/>
    <rect width="900" height="320" fill="url(#glowR)">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="5s" repeatCount="indefinite"/>
    </rect>

    <!-- Grid verticals -->
    <g stroke="#3b0764" stroke-width="0.5" opacity="0.2">
      <line x1="75"  y1="0" x2="75"  y2="320"/>
      <line x1="150" y1="0" x2="150" y2="320"/>
      <line x1="225" y1="0" x2="225" y2="320"/>
      <line x1="300" y1="0" x2="300" y2="320"/>
      <line x1="375" y1="0" x2="375" y2="320"/>
      <line x1="450" y1="0" x2="450" y2="320"/>
      <line x1="525" y1="0" x2="525" y2="320"/>
      <line x1="600" y1="0" x2="600" y2="320"/>
      <line x1="675" y1="0" x2="675" y2="320"/>
      <line x1="750" y1="0" x2="750" y2="320"/>
      <line x1="825" y1="0" x2="825" y2="320"/>
    </g>

    <!-- Grid horizontals -->
    <g stroke="#3b0764" stroke-width="0.5" opacity="0.2">
      <line x1="0" y1="64"  x2="900" y2="64"/>
      <line x1="0" y1="128" x2="900" y2="128"/>
      <line x1="0" y1="192" x2="900" y2="192"/>
      <line x1="0" y1="256" x2="900" y2="256"/>
    </g>

    <!-- Scan sweep line -->
    <rect x="0" y="-3" width="900" height="2.5" fill="url(#lineGrad)" opacity="0.25">
      <animate attributeName="y" from="-3" to="323" dur="5s" repeatCount="indefinite" calcMode="linear"/>
    </rect>

    <!-- ═══════════════════════════════════════
         TERMINAL BOX — centered at x=450
         width=420, so x = 450-210 = 240
         ═══════════════════════════════════════ -->
    <rect x="240" y="22" width="420" height="78" rx="8"
          fill="#06060e" stroke="#4c1d95" stroke-width="1.2"/>
    <!-- inner glow border -->
    <rect x="241" y="23" width="418" height="76" rx="7"
          fill="none" stroke="#7c3aed" stroke-width="0.6" opacity="0.45"/>

    <!-- Traffic lights -->
    <circle cx="260" cy="36" r="4.5" fill="#ff5f57"/>
    <circle cx="276" cy="36" r="4.5" fill="#febc2e"/>
    <circle cx="292" cy="36" r="4.5" fill="#28c840"/>

    <!-- Terminal title bar separator -->
    <line x1="240" y1="48" x2="660" y2="48" stroke="#2e1065" stroke-width="0.8" opacity="0.7"/>

    <!-- Prompt > -->
    <text
      x="260" y="72"
      font-family="'Courier New', Courier, monospace"
      font-size="16" font-weight="bold"
      fill="#7c6af7"
      filter="url(#neonGlow)"
      opacity="0">
      &gt;
      <animate attributeName="opacity" values="0;1" dur="0.05s" begin="0.3s" fill="freeze"/>
    </text>

    <!-- GLOWING INITIALIZING PORTFOLIO.EXE -->
    <text
      x="278" y="72"
      font-family="'Courier New', Courier, monospace"
      font-size="16" font-weight="bold"
      fill="#a78bfa"
      filter="url(#neonGlow)"
      letter-spacing="1.5"
      opacity="0">
      INITIALIZING PORTFOLIO.EXE
      <animate attributeName="opacity" values="0;1" dur="0.05s" begin="0.6s" fill="freeze"/>
    </text>

    <!-- Blinking cursor _ -->
    <text
      x="538" y="72"
      font-family="'Courier New', Courier, monospace"
      font-size="16" font-weight="bold"
      fill="#a78bfa"
      filter="url(#neonGlow)">
      _
      <animate attributeName="opacity" values="1;0;1" dur="0.85s" begin="0.6s" repeatCount="indefinite"/>
    </text>

    <!-- Success line — centered under terminal text -->
    <text
      x="450" y="90"
      font-family="'Courier New', Courier, monospace"
      font-size="11" text-anchor="middle"
      fill="#4ade80"
      filter="url(#softGlow)"
      opacity="0">
      ✓  STATUS: ONLINE  //  BUILD: PRODUCTION  //  DEPLOY: AWS
      <animate attributeName="opacity" values="0;1" dur="0.05s" begin="1.5s" fill="freeze"/>
    </text>

    <!-- ═══════════════════════════════════════
         NAME — fully centered at x=450
         ═══════════════════════════════════════ -->

    <!-- Ashish — glow halo -->
    <text
      x="450" y="182"
      font-family="Arial Black, 'Arial Bold', Arial, sans-serif"
      font-size="80" font-weight="900"
      fill="#c4b5fd"
      text-anchor="middle"
      filter="url(#nameGlow)"
      opacity="0">
      Ashish
      <animate attributeName="opacity" values="0;0.3" dur="0.5s" begin="0.8s" fill="freeze"/>
    </text>

    <!-- Ashish — sharp foreground -->
    <text
      x="450" y="182"
      font-family="Arial Black, 'Arial Bold', Arial, sans-serif"
      font-size="80" font-weight="900"
      fill="url(#nameGrad)"
      text-anchor="middle"
      opacity="0">
      Ashish
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.8s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate"
        from="0,16" to="0,0" dur="0.5s" begin="0.8s" fill="freeze" additive="sum"/>
    </text>

    <!-- Wankhade — glow halo -->
    <text
      x="450" y="258"
      font-family="Arial Black, 'Arial Bold', Arial, sans-serif"
      font-size="80" font-weight="900"
      fill="#38bdf8"
      text-anchor="middle"
      filter="url(#nameGlow)"
      opacity="0">
      Wankhade
      <animate attributeName="opacity" values="0;0.25" dur="0.5s" begin="1.1s" fill="freeze"/>
    </text>

    <!-- Wankhade — sharp foreground -->
    <text
      x="450" y="258"
      font-family="Arial Black, 'Arial Bold', Arial, sans-serif"
      font-size="80" font-weight="900"
      fill="url(#nameGrad)"
      text-anchor="middle"
      opacity="0">
      Wankhade
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.1s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate"
        from="0,16" to="0,0" dur="0.5s" begin="1.1s" fill="freeze" additive="sum"/>
    </text>

    <!-- Underline sweep — centered -->
    <rect x="450" y="267" width="0" height="2.5" rx="1.5" fill="url(#lineGrad)">
      <animate attributeName="width" from="0"   to="500"  dur="0.8s" begin="1.3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="x"     from="450" to="200"  dur="0.8s" begin="1.3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>

    <!-- Subtitle — centered -->
    <text
      x="450" y="298"
      font-family="'Courier New', Courier, monospace"
      font-size="11.5" text-anchor="middle"
      fill="#475569"
      letter-spacing="5"
      filter="url(#softGlow)"
      opacity="0">
      BACKEND  ·  FULL-STACK  ·  CLOUD  ·  DEVOPS  ·  AI
      <animate attributeName="opacity" values="0;0.85" dur="0.5s" begin="1.7s" fill="freeze"/>
    </text>

    <!-- Corner brackets -->
    <path d="M0,18 L0,0 L18,0"            stroke="#7c3aed" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M882,0 L900,0 L900,18"        stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M0,302 L0,320 L18,320"        stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M882,320 L900,320 L900,302"   stroke="#7c3aed" stroke-width="2" fill="none" opacity="0.7"/>

    <!-- Floating particles top-right -->
    <circle cx="810" cy="42" r="2.2" fill="#7c6af7" opacity="0.5">
      <animate attributeName="cy"      values="42;30;42"    dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5"   dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="836" cy="60" r="1.6" fill="#38bdf8" opacity="0.4">
      <animate attributeName="cy"      values="60;48;60"    dur="4.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="4.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="858" cy="36" r="1.2" fill="#f472b6" opacity="0.5">
      <animate attributeName="cy"      values="36;24;36"    dur="2.7s" repeatCount="indefinite"/>
    </circle>

    <!-- Floating particles bottom-left -->
    <circle cx="68"  cy="262" r="1.8" fill="#7c6af7" opacity="0.4">
      <animate attributeName="cy"      values="262;250;262" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="46"  cy="282" r="1.2" fill="#38bdf8" opacity="0.35">
      <animate attributeName="cy"      values="282;270;282" dur="2.9s" repeatCount="indefinite"/>
    </circle>

  </g>
</svg>